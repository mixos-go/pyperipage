name: peripage
description: "PeriPage A9 - Modern Thermal Printer App for PDF, Images & Labels"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # HTTP Client untuk komunikasi dengan Python backend
  http: ^1.2.0
  
  # Image Picker untuk select gambar dari gallery/camera
  image_picker: ^1.0.7
  
  # File Picker untuk select PDF
  file_picker: ^8.2.1
  
  # PDF rasterisasi (Android/iOS) -- pengganti pdf2image+poppler yang cuma
  # jalan di desktop. Dipakai ApiService.printPdf() buat render halaman PDF
  # jadi gambar SEBELUM dikirim ke python_service.py (yang cuma terima
  # gambar, bukan PDF mentah -- pymupdf tidak bisa dipasang di Chaquopy).
  pdfx: ^2.6.0
  
  # Path Provider untuk akses file system
  path_provider: ^2.1.2
  path: ^1.9.0
  
  # Permission Handler untuk request permissions
  permission_handler: ^11.3.0
  
  # UI Components
  google_fonts: ^6.1.0
  
  # Bluetooth (untuk future BLE integration langsung dari Flutter)
  flutter_blue_plus: ^1.31.0
  
  # Image manipulation
  cached_network_image: ^3.3.1
  
  # Loading indicators
  flutter_spinkit: ^5.2.0

  # Share/export file (dipakai fitur "Export Log" di Settings, supaya log
  # aplikasi bisa dikirim keluar app -- WhatsApp, email, dll -- tanpa perlu
  # adb logcat sama sekali).
  share_plus: ^12.0.2

  # Lottie -- animasi/ilustrasi "3D-style" (icon printer animasi, background
  # dekoratif, avatar) dipakai di seluruh redesign UI/UX (bukan model 3D
  # interaktif beneran, tapi animasi vektor ringan yang render konsisten di
  # semua platform, termasuk desktop -- three.js/model_viewer tidak reliable
  # di Windows/Linux desktop Flutter).
  lottie: ^3.3.1

  # Manual Crop Editor -- drag/pinch buat pilih area crop sendiri, pure-Dart
  # (bukan native platform view), jadi jalan di semua platform termasuk
  # desktop Windows/Linux (beda dengan image_cropper yang cuma mobile).
  # (crop_your_image DIHAPUS Juli 2026: 2x percobaan pakai package ini
  # gagal karena resize handle tidak muncul di device fisik -- API
  # cornerDotBuilder/onMoved-nya tidak konsisten dengan dokumentasi yang
  # tersedia. Manual Crop Editor sekarang dibangun sendiri dari widget
  # Flutter dasar di lib/screens/crop/manual_crop_screen.dart -- 100%
  # terkontrol, tidak bergantung API package pihak ketiga lagi.)

  # Persist pilihan tema (Light/Dark/AMOLED) antar sesi.
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # App icon generator lintas platform (Android/iOS/macOS/Windows/Linux/web)
  # -- source icon: assets/icons/app_icon_circle.png (sudah di-crop lingkaran).
  # Jalankan: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.3

  # Splash screen generator (Android 12+ splash API & legacy splash utk
  # iOS/Android lama) -- pakai icon yang sama biar konsisten.
  # Jalankan: dart run flutter_native_splash:create
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/lottie/

# Konfigurasi flutter_launcher_icons -- generate icon ke SEMUA platform
# sekaligus dari 1 source image, jadi tidak perlu bikin manual per-platform.
flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/icons/app_icon_circle.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon_circle.png"
    icon_size: 256
  image_path: "assets/icons/app_icon_circle.png"
  min_sdk_android: 21
  # Adaptive icon Android (foreground+background terpisah, wajib Android 8+)
  # -- background putih solid biar konsisten sama halo di icon aslinya.
  adaptive_icon_background: "#FFFFFF"
  # Pakai versi dengan padding safe-zone (66%) khusus, BUKAN file yang sama
  # dengan icon_path -- adaptive icon Android bisa kepotong system mask/
  # animasi kalau logo mengisi penuh kanvas tanpa padding.
  adaptive_icon_foreground: "assets/icons/app_icon_adaptive_fg.png"
  remove_alpha_ios: true # Apple wajib icon tanpa alpha channel

# Konfigurasi flutter_native_splash -- splash screen pas app dibuka,
# background putih + logo di tengah, konsisten sama warna brand (biru).
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/icons/app_icon_circle.png
  color_dark: "#0D1117"
  image_dark: assets/icons/app_icon_circle.png
  android_12:
    image: assets/icons/app_icon_circle.png
    color: "#FFFFFF"
    image_dark: assets/icons/app_icon_circle.png
    color_dark: "#0D1117"
  web: false
