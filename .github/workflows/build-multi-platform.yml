name: Build Multi-Platform

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS IPA'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows EXE'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS DMG'
        type: boolean
        default: false
      build_linux:
        description: 'Build Linux AppImage'
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate version
        run: echo "Building version ${{ github.event.inputs.version }}"

  build-android:
    needs: setup
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chaquopy dependencies
        run: |
          pip install --upgrade pip
          cd flutter_app/peripage
          # Chaquopy will handle Python dependencies during gradle build

      - name: Build Android APK
        run: |
          cd flutter_app/peripage
          flutter build apk --release --split-per-abi
          mkdir -p ../build_outputs/android
          cp build/app/outputs/flutter-apk/*.apk ../build_outputs/android/

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/android/*.apk
          retention-days: 7

  build-ios:
    needs: setup
    if: ${{ github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build iOS IPA
        run: |
          cd flutter_app/peripage
          flutter build ios --release --no-codesign
          # Note: Real IPA signing requires certificates and provisioning profiles
          # This creates a .app bundle for testing
          mkdir -p ../build_outputs/ios
          cp -r build/ios/iphoneos/Runner.app ../build_outputs/ios/ || echo "No codesign, app bundle created for testing"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/ios/
          retention-days: 7

  build-windows:
    needs: setup
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage_backend desktop_main.py
          mkdir -p ../flutter_app/peripage/windows/runner/python_dist
          cp dist/peripage_backend.exe ../flutter_app/peripage/windows/runner/python_dist/

      - name: Build Windows EXE
        run: |
          cd flutter_app/peripage
          flutter build windows --release
          # Copy Python backend to build output
          cp windows/runner/python_dist/peripage_backend.exe build/windows/runner/Release/
          
      - name: Create Windows Distribution
        run: |
          cd flutter_app/peripage/build/windows/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../build_outputs/windows/peripage-windows-${{ needs.setup.outputs.version }}.zip

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/windows/*.zip
          retention-days: 7

  build-macos:
    needs: setup
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage_backend desktop_main.py
          mkdir -p ../flutter_app/peripage/macos/Runner/python_dist
          cp dist/peripage_backend ../flutter_app/peripage/macos/Runner/python_dist/

      - name: Build macOS App
        run: |
          cd flutter_app/peripage
          flutter build macos --release
          # Copy Python backend
          cp macos/Runner/python_dist/peripage_backend build/macos/Build/Products/Release/peripage.app/Contents/MacOS/

      - name: Create DMG
        run: |
          cd flutter_app/peripage/build/macos/Build/Products/Release
          hdiutil create -volname "PeriPage" -srcfolder peripage.app -ov -format UDZO ../../../../build_outputs/macos/peripage-macos-${{ needs.setup.outputs.version }}.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/macos/*.dmg
          retention-days: 7

  build-linux:
    needs: setup
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage_backend desktop_main.py
          mkdir -p ../flutter_app/peripage/linux/python_dist
          cp dist/peripage_backend ../flutter_app/peripage/linux/python_dist/

      - name: Build Linux App
        run: |
          cd flutter_app/peripage
          flutter build linux --release
          # Copy Python backend
          cp linux/python_dist/peripage_backend build/linux/x64/release/bundle/

      - name: Create AppImage
        run: |
          cd flutter_app/peripage/build/linux/x64/release/bundle
          # Simple tarball for now (AppImage requires additional setup)
          tar -czf ../../../../build_outputs/linux/peripage-linux-${{ needs.setup.outputs.version }}.tar.gz *
          
      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/linux/*.tar.gz
          retention-days: 7
