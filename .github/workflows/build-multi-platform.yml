name: Build Multi-Platform

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS IPA (No Codesign)'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows EXE'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS DMG'
        type: boolean
        default: false
      build_linux:
        description: 'Build Linux Tarball'
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate version
        run: echo "Building version ${{ github.event.inputs.version }}"
      - name: Check peripage_a9 sync (library/ adalah source of truth)
        run: |
          python3 scripts/sync_peripage_a9.py --check

  build-android:
    needs: setup
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17 (Required for Gradle 8)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter 3.44.4 (matches verified local build)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd flutter_app/peripage
          flutter pub get

      - name: Build Android APK
        run: |
          cd flutter_app/peripage
          flutter build apk --release
          mkdir -p ../build_outputs/android
          cp build/app/outputs/flutter-apk/*.apk ../build_outputs/android/

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/android/*.apk
          retention-days: 7

  build-ios:
    needs: setup
    if: ${{ github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Build iOS (No Codesign)
        run: |
          cd flutter_app/peripage
          flutter config --enable-ios
          flutter build ios --release --no-codesign
          mkdir -p ../build_outputs/ios
          cp -r build/ios/iphoneos/Runner.app ../build_outputs/ios/ || echo "App bundle created"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/ios/
          retention-days: 7

  build-windows:
    needs: setup
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller & Dependencies
        run: pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage-backend desktop_main.py
          mkdir -p ../flutter_app/peripage/windows/runner/python_dist
          cp dist/peripage-backend.exe ../flutter_app/peripage/windows/runner/python_dist/

      - name: Build Windows EXE
        env:
          # Fix Juli 2026: plugin `pdfx` (dipakai render PDF di Android) juga
          # bawa proyek CMake untuk Windows (download pdfium), tapi
          # CMakeLists.txt-nya pakai `cmake_minimum_required` versi lama
          # (<3.5) yang sudah TIDAK didukung lagi oleh CMake terbaru di
          # runner GitHub Actions -- errornya persis nyaranin fix ini:
          # "add -DCMAKE_POLICY_VERSION_MINIMUM=3.5 to try configuring
          # anyway". Env var ini dibaca CMake secara global, jadi tidak
          # perlu edit CMakeLists.txt pihak ketiga manapun.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          cd flutter_app/peripage
          flutter config --enable-windows-desktop
          flutter build windows --release
          
      - name: Copy Backend to Build Directory
        run: |
          $backendPath = "flutter_app/peripage/windows/runner/python_dist/peripage-backend.exe"
          $destPath = "flutter_app/peripage/build/windows/x64/runner/Release/peripage-backend.exe"
          if (Test-Path $backendPath) {
            New-Item -ItemType Directory -Force -Path (Split-Path $destPath) | Out-Null
            Copy-Item $backendPath $destPath -Force
            Write-Host "Backend copied successfully"
          } else {
            Write-Host "Backend not found, skipping copy"
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ needs.setup.outputs.version }}
          path: flutter_app/peripage/build/windows/x64/runner/Release
          retention-days: 7

  build-macos:
    needs: setup
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage-backend desktop_main.py
          mkdir -p ../flutter_app/peripage/macos/Runner/python_dist
          cp dist/peripage-backend ../flutter_app/peripage/macos/Runner/python_dist/

      - name: Build macOS App
        run: |
          cd flutter_app/peripage
          flutter config --enable-macos-desktop
          flutter build macos --release
          cp macos/Runner/python_dist/peripage-backend build/macos/Build/Products/Release/peripage.app/Contents/MacOS/ || echo "Backend copied"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-${{ needs.setup.outputs.version }}
          path: flutter_app/peripage/build/macos/Build/Products/Release/peripage.app
          retention-days: 7

  build-linux:
    needs: setup
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage-backend desktop_main.py
          mkdir -p ../flutter_app/peripage/linux/python_dist
          cp dist/peripage-backend ../flutter_app/peripage/linux/python_dist/

      - name: Build Linux App
        env:
          # Fix Juli 2026: sama seperti Windows -- pdfx bawa proyek CMake
          # (download pdfium) yang bisa saja pakai cmake_minimum_required
          # lama & tidak kompatibel dengan CMake terbaru. Ditambahkan
          # proaktif di sini juga supaya tidak muncul error yang sama nanti.
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: |
          cd flutter_app/peripage
          flutter config --enable-linux-desktop
          flutter build linux --release
          cp linux/python_dist/peripage-backend build/linux/x64/release/bundle/ || echo "Backend copied"

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app-${{ needs.setup.outputs.version }}
          path: flutter_app/peripage/build/linux/x64/release/bundle
          retention-days: 7
