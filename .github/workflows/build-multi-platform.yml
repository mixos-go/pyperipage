name: Build Multi-Platform

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        default: '1.0.0'
      build_android:
        description: 'Build Android APK'
        type: boolean
        default: true
      build_ios:
        description: 'Build iOS IPA (No Codesign)'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows EXE'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS DMG'
        type: boolean
        default: false
      build_linux:
        description: 'Build Linux Tarball'
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.inputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Validate version
        run: echo "Building version ${{ github.event.inputs.version }}"

  build-android:
    needs: setup
    if: ${{ github.event.inputs.build_android == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17 (Required for Gradle 8)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Flutter 3.24.0 (Stable for Gradle 8 compatibility)
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: |
          cd flutter_app/peripage
          flutter pub get

      - name: Build Android APK
        run: |
          cd flutter_app/peripage
          flutter build apk --release --split-per-abi
          mkdir -p ../build_outputs/android
          cp build/app/outputs/flutter-apk/*.apk ../build_outputs/android/

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/android/*.apk
          retention-days: 7

  build-ios:
    needs: setup
    if: ${{ github.event.inputs.build_ios == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Build iOS (No Codesign)
        run: |
          cd flutter_app/peripage
          flutter build ios --release --no-codesign
          mkdir -p ../build_outputs/ios
          cp -r build/ios/iphoneos/Runner.app ../build_outputs/ios/ || echo "App bundle created"

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/ios/
          retention-days: 7

  build-windows:
    needs: setup
    if: ${{ github.event.inputs.build_windows == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Visual Studio Build Tools (Required for CMake)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: Install Ninja Build
        run: choco install ninja --no-progress -y

      - name: Configure Windows build generator
        shell: pwsh
        run: |
          echo "CMAKE_GENERATOR=Ninja" >> $env:GITHUB_ENV
          echo "CMAKE_GENERATOR_PLATFORM=x64" >> $env:GITHUB_ENV

      - name: Install PyInstaller & Dependencies
        run: pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage_backend desktop_main.py
          mkdir -p ../flutter_app/peripage/windows/runner/python_dist
          cp dist/peripage_backend.exe ../flutter_app/peripage/windows/runner/python_dist/

      - name: Build Windows EXE with Ninja
        run: |
          cd flutter_app/peripage
          flutter build windows --release
          
      - name: Copy Backend to Build Directory
        run: |
          $backendPath = "flutter_app/peripage/windows/runner/python_dist/peripage_backend.exe"
          $destPath = "flutter_app/peripage/build/windows/runner/Release/peripage_backend.exe"
          if (Test-Path $backendPath) {
            New-Item -ItemType Directory -Force -Path (Split-Path $destPath) | Out-Null
            Copy-Item $backendPath $destPath -Force
            Write-Host "Backend copied successfully"
          } else {
            Write-Host "Backend not found, skipping copy"
          }

      - name: Create Windows Distribution
        run: |
          cd flutter_app/peripage/build/windows/runner/Release
          Compress-Archive -Path * -DestinationPath ../../../../build_outputs/windows/peripage-windows-${{ needs.setup.outputs.version }}.zip -Force

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/windows/*.zip
          retention-days: 7

  build-macos:
    needs: setup
    if: ${{ github.event.inputs.build_macos == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PyInstaller
        run: pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage_backend desktop_main.py
          mkdir -p ../flutter_app/peripage/macos/Runner/python_dist
          cp dist/peripage_backend ../flutter_app/peripage/macos/Runner/python_dist/

      - name: Build macOS App
        run: |
          cd flutter_app/peripage
          flutter build macos --release
          cp macos/Runner/python_dist/peripage_backend build/macos/Build/Products/Release/peripage.app/Contents/MacOS/ || echo "Backend copied"

      - name: Create DMG
        run: |
          cd flutter_app/peripage/build/macos/Build/Products/Release
          hdiutil create -volname "PeriPage" -srcfolder peripage.app -ov -format UDZO ../../../../build_outputs/macos/peripage-macos-${{ needs.setup.outputs.version }}.dmg

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/macos/*.dmg
          retention-days: 7

  build-linux:
    needs: setup
    if: ${{ github.event.inputs.build_linux == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev
          pip install pyinstaller fastapi uvicorn pillow pyusb bleak

      - name: Build Python Backend
        run: |
          cd core_python
          pyinstaller --onefile --name=peripage_backend desktop_main.py
          mkdir -p ../flutter_app/peripage/linux/python_dist
          cp dist/peripage_backend ../flutter_app/peripage/linux/python_dist/

      - name: Build Linux App
        run: |
          cd flutter_app/peripage
          flutter build linux --release
          cp linux/python_dist/peripage_backend build/linux/x64/release/bundle/ || echo "Backend copied"

      - name: Create Tarball
        run: |
          cd flutter_app/peripage/build/linux/x64/release/bundle
          tar -czf ../../../../build_outputs/linux/peripage-linux-${{ needs.setup.outputs.version }}.tar.gz *

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-app-${{ needs.setup.outputs.version }}
          path: flutter_app/build_outputs/linux/*.tar.gz
          retention-days: 7
