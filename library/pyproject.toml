[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "peripage-a9-usb"
version = "1.0.0"
authors = [
    { name="Bagas Alfariz" }
]
description = "Universal Native USB Driver with 4-Way Smart Crop for PeriPage A9 on Linux"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "pyusb>=1.2.1",
    "pillow>=10.0.0",
    "pdf2image>=1.17.0"
]
classifiers = [
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: MIT License",
    "Operating System :: POSIX :: Linux",
]
